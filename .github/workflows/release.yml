name: release

# Keyless publish to npm via OIDC Trusted Publishing.
# Trigger: push a version tag (e.g. v0.8.0). No NPM_TOKEN secret is used. # npm exchanges the GitHub OIDC token for a short-lived publish credential and
# stamps provenance automatically. Requires a Trusted Publisher to be configured
# on npmjs.com for @neilberkman/sidereon pointing at this repo + workflow.
on:
  push:
    tags: ['v*']

permissions:
  contents: read
  id-token: write   # required for OIDC trusted publishing + provenance

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - uses: jetli/wasm-pack-action@v0.4.0
        with:
          version: latest

      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'

      # OIDC trusted publishing needs npm >= 11.5.1. Pinned to the 11.x line:
      # npm@12.0.0 ships a broken provenance publish (libnpmpublish cannot
      # resolve sigstore), so npm@latest is not safe here.
      - name: Upgrade npm
        run: npm install -g npm@11

      - name: Install
        run: npm ci

      - name: Verify tag matches package version
        env:
          RELEASE_TAG: ${{ github.ref_name }}
        run: node -e "const expected = 'v' + require('./package.json').version; if (process.env.RELEASE_TAG !== expected) { console.error('tag ' + process.env.RELEASE_TAG + ' does not match package ' + expected); process.exit(1); }"

      - name: Build (web + node targets)
        run: npm run build

      - name: Test
        run: npm test

      - name: Publish (keyless OIDC + provenance)
        run: npm publish --access public --provenance
